<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AceStrike — Moins d'administratif, plus de jeu. Set et Match.</title>
<meta name="description" content="AceStrike modernise les clubs de tennis : site web sur-mesure, inscriptions en ligne, paiements sécurisés et référencement local. La solution complémentaire de TenUp.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Organization",
  "name":"AceStrike",
  "description":"Solution web sur-mesure pour clubs de tennis affiliés FFT",
  "url":"https://acestrike.fr",
  "founder":{"@type":"Person","name":"Amaury Despretz"},
  "areaServed":"FR",
  "serviceType":"Création de site web et gestion numérique pour clubs de tennis"
}
</script>

<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --ink:      #0a2e1a;
  --ink-mid:  #1a5c34;
  --ink-lite: #2d8a54;
  --pale:     #e8f5ee;
  --acid:     #c8f03c;
  --acid-dk:  #96b82a;
  --cream:    #f7f5f0;
  --white:    #ffffff;
  --muted:    #6b7c72;
  --border:   rgba(10,46,26,.12);
  --border-md:rgba(10,46,26,.22);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'DM Sans',sans-serif;
  font-weight:400;
  color:var(--ink);
  background:var(--cream);
  line-height:1.75;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* ═══════════════════════════════════════════
   COURT LINE BACKGROUND PATTERN
═══════════════════════════════════════════ */
.court-bg {
  background-image:
    linear-gradient(rgba(10,46,26,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,46,26,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.court-bg-dark {
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(10,46,26,.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(200,240,60,.15);
  padding: 0 clamp(1rem,5vw,3rem);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family:'Playfair Display',serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--acid);
  letter-spacing: -0.5px;
  cursor: pointer;
}
.nav-logo span { color: rgba(255,255,255,.5); font-weight:300; font-size:14px; margin-left:6px; font-family:'DM Sans',sans-serif; }
.nav-links {
  display: flex;
  gap: 2px;
  align-items: center;
}
.nav-links a, .nav-links button {
  background: none;
  border: none;
  color: rgba(255,255,255,.7);
  font-size: 13px;
  font-weight: 400;
  padding: 6px 14px;
  border-radius: 6px;
  transition: all .2s;
  white-space: nowrap;
}
.nav-links a:hover, .nav-links button:hover { color:white; background:rgba(255,255,255,.08); }
.nav-links .nav-cta {
  background: var(--acid);
  color: var(--ink);
  font-weight: 500;
  margin-left: 8px;
  border-radius: 6px;
}
.nav-links .nav-cta:hover { background: #d4f540; transform: translateY(-1px); }
.nav-dropdown { position: relative; }
.nav-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--ink);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-md);
  padding: 8px;
  min-width: 220px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.nav-dropdown:hover .nav-dropdown-menu { display: block; }
.nav-dropdown-menu a, .nav-dropdown-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 9px 14px;
  border-radius: 6px;
  font-size:13px;
}
.hamburger { display:none; flex-direction:column; gap:5px; background:none; border:none; padding:4px; }
.hamburger span { display:block; width:22px; height:2px; background:white; border-radius:2px; transition:.3s; }

/* ═══════════════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════════════ */
.page { display:none; min-height:100vh; padding-top:64px; }
.page.active { display:block; }

/* ═══════════════════════════════════════════
   HERO — HOME
═══════════════════════════════════════════ */
.hero {
  background: var(--ink);
  color: white;
  padding: clamp(4rem,10vw,8rem) clamp(1.5rem,6vw,4rem) clamp(3rem,8vw,6rem);
  position: relative;
  overflow: hidden;
  min-height: 90vh;
  display: flex;
  align-items: center;
}
.hero-court {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 72px 72px;
}
.hero-circle {
  position: absolute;
  right: -120px;
  top: -120px;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(200,240,60,.1);
}
.hero-circle2 {
  position: absolute;
  right: -200px;
  top: -200px;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  border: 1px solid rgba(200,240,60,.05);
}
.hero-net {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(200,240,60,.4), rgba(200,240,60,.8), rgba(200,240,60,.4), transparent);
}
.hero-inner {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,240,60,.12);
  border: 1px solid rgba(200,240,60,.3);
  color: var(--acid);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 20px;
  margin-bottom: 28px;
  animation: fadeUp .6s ease both;
}
.hero-eyebrow::before { content:'🎾'; font-size:14px; }
.hero h1 {
  font-family:'Playfair Display',serif;
  font-size: clamp(2.4rem, 6vw, 5rem);
  font-weight: 900;
  line-height: 1.08;
  margin-bottom: 28px;
  color: white;
  animation: fadeUp .6s .1s ease both;
}
.hero h1 em { color:var(--acid); font-style:normal; }
.hero-sub {
  font-size: clamp(1rem,2vw,1.2rem);
  color: rgba(255,255,255,.65);
  max-width: 560px;
  margin-bottom: 44px;
  line-height: 1.7;
  animation: fadeUp .6s .2s ease both;
}
.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  animation: fadeUp .6s .3s ease both;
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--acid);
  color: var(--ink);
  font-weight: 500;
  font-size: 15px;
  padding: 14px 28px;
  border-radius: var(--r-sm);
  border: none;
  transition: all .2s;
}
.btn-primary:hover { background:#d4f540; transform:translateY(-2px); box-shadow:0 8px 24px rgba(200,240,60,.3); }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.08);
  color: white;
  font-weight: 400;
  font-size: 15px;
  padding: 14px 28px;
  border-radius: var(--r-sm);
  border: 1px solid rgba(255,255,255,.2);
  transition: all .2s;
}
.btn-secondary:hover { background:rgba(255,255,255,.14); }
.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 60px;
  padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,.08);
  flex-wrap: wrap;
  animation: fadeUp .6s .4s ease both;
}
.hero-stat-num {
  font-family:'Playfair Display',serif;
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--acid);
  line-height: 1;
  display: block;
}
.hero-stat-txt {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  margin-top: 4px;
  max-width: 120px;
  line-height: 1.4;
}

/* ═══════════════════════════════════════════
   SECTION COMMONS
═══════════════════════════════════════════ */
.section { padding: clamp(3rem,8vw,6rem) clamp(1.5rem,6vw,4rem); }
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-tag {
  display: inline-block;
  background: var(--pale);
  color: var(--ink-mid);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}
.section-tag.dark {
  background: rgba(200,240,60,.15);
  color: var(--acid);
}
.section-h2 {
  font-family:'Playfair Display',serif;
  font-size: clamp(1.8rem,4vw,3rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 16px;
}
.section-h2.light { color: white; }
.section-h2 em { color:var(--ink-lite); font-style:normal; }
.section-h2.light em { color:var(--acid); }
.section-intro {
  font-size: 1.05rem;
  color: var(--muted);
  max-width: 580px;
  margin-bottom: 48px;
  line-height: 1.7;
}
.section-intro.light { color:rgba(255,255,255,.65); }

/* ═══════════════════════════════════════════
   FEATURES GRID
═══════════════════════════════════════════ */
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}
.feature-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.feature-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, var(--ink-mid), var(--acid));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .3s;
}
.feature-card:hover::before { transform:scaleX(1); }
.feature-card:hover { transform:translateY(-4px); box-shadow:0 16px 48px rgba(10,46,26,.12); }
.feature-icon {
  width: 48px; height: 48px;
  background: var(--pale);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 18px;
}
.feature-card h3 {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 8px;
}
.feature-card p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
}

/* ═══════════════════════════════════════════
   PROBLEM / SOLUTION SPLIT
═══════════════════════════════════════════ */
.split { display:grid; grid-template-columns:1fr 1fr; gap:clamp(2rem,5vw,4rem); align-items:center; }
@media(max-width:760px){ .split{grid-template-columns:1fr;} }
.split-visual {
  background: var(--ink);
  border-radius: var(--r-xl);
  padding: 40px;
  position: relative;
  overflow: hidden;
}
.split-visual .court-bg-dark { position:absolute;inset:0; }
.mock-screen {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-md);
  padding: 20px;
  position: relative;
}
.mock-bar { height:8px; border-radius:4px; background:rgba(255,255,255,.1); margin-bottom:12px; }
.mock-bar.acid { background:rgba(200,240,60,.4); width:60%; }
.mock-bar.short { width:40%; }
.mock-stat {
  display:flex; gap:12px; margin-top:16px;
}
.mock-stat-box {
  flex:1; background:rgba(200,240,60,.1); border:1px solid rgba(200,240,60,.2);
  border-radius:8px; padding:12px; text-align:center;
}
.mock-stat-num { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:var(--acid); display:block; }
.mock-stat-lbl { font-size:11px; color:rgba(255,255,255,.5); }

/* ═══════════════════════════════════════════
   COMPARISON TABLE
═══════════════════════════════════════════ */
.compare-wrap { overflow-x:auto; border-radius:var(--r-lg); border:1px solid var(--border); }
.compare-table { width:100%; border-collapse:collapse; font-size:14px; background:white; }
.compare-table thead { background:var(--ink); }
.compare-table thead th { padding:16px 20px; text-align:left; font-weight:500; color:white; font-size:13px; }
.compare-table thead th:first-child { color:rgba(255,255,255,.6); }
.compare-table thead th.col-as { color:var(--acid); }
.compare-table tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
.compare-table tbody tr:hover { background:var(--pale); }
.compare-table td { padding:14px 20px; }
.compare-table td:first-child { font-weight:500; color:var(--ink); font-size:13px; }
.ck { color:var(--ink-lite); font-size:16px; }
.cx { color:#c0392b; font-size:16px; }
.cp { color:#d35400; font-size:12px; }

/* ═══════════════════════════════════════════
   PRICING / OFFER
═══════════════════════════════════════════ */
.offer-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
}
.offer-card {
  background:white;
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:32px;
  position:relative;
}
.offer-card.featured {
  border:2px solid var(--ink-mid);
  background: white;
}
.offer-badge {
  position:absolute;
  top:-12px; left:50%;
  transform:translateX(-50%);
  background:var(--acid);
  color:var(--ink);
  font-size:11px;
  font-weight:500;
  padding:4px 16px;
  border-radius:20px;
  white-space:nowrap;
}
.offer-name { font-size:13px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
.offer-price {
  font-family:'Playfair Display',serif;
  font-size:2.8rem;
  font-weight:900;
  color:var(--ink);
  line-height:1;
  margin-bottom:4px;
}
.offer-price span { font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:400; color:var(--muted); }
.offer-desc { font-size:14px; color:var(--muted); margin:16px 0 24px; line-height:1.6; }
.offer-features { list-style:none; margin-bottom:28px; }
.offer-features li {
  font-size:14px;
  color:#333;
  padding:7px 0;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.offer-features li::before { content:'✓'; color:var(--ink-lite); font-weight:500; flex-shrink:0; margin-top:1px; }
.offer-cta {
  display:block;
  text-align:center;
  padding:13px;
  border-radius:var(--r-sm);
  font-weight:500;
  font-size:14px;
  transition:all .2s;
  border:1px solid var(--border-md);
  color:var(--ink);
}
.offer-card.featured .offer-cta {
  background:var(--ink);
  color:white;
  border-color:var(--ink);
}
.offer-cta:hover { opacity:.85; transform:translateY(-1px); }

/* ═══════════════════════════════════════════
   TESTIMONIALS
═══════════════════════════════════════════ */
.testimonial-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}
.testimonial-card {
  background:white;
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:28px;
}
.testimonial-stars { color:var(--acid-dk); font-size:14px; margin-bottom:14px; }
.testimonial-text {
  font-size:15px;
  color:#333;
  line-height:1.7;
  margin-bottom:20px;
  font-style:italic;
}
.testimonial-author { display:flex; align-items:center; gap:12px; }
.testimonial-avatar {
  width:40px; height:40px; border-radius:50%;
  background:var(--ink);
  color:var(--acid);
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-weight:700;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.testimonial-name { font-size:14px; font-weight:500; color:var(--ink); }
.testimonial-role { font-size:12px; color:var(--muted); }

/* ═══════════════════════════════════════════
   BLOG GRID
═══════════════════════════════════════════ */
.blog-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
  gap:20px;
}
.blog-card {
  background:white;
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  cursor:pointer;
  transition:all .25s;
}
.blog-card:hover { transform:translateY(-4px); box-shadow:0 16px 48px rgba(10,46,26,.1); }
.blog-card-thumb {
  height:160px;
  background:var(--ink);
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.blog-thumb-bg {
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:40px 40px;
}
.blog-thumb-emoji { font-size:48px; position:relative; }
.blog-card-tag {
  position:absolute;bottom:12px;left:12px;
  background:var(--acid);
  color:var(--ink);
  font-size:11px;
  font-weight:500;
  padding:3px 10px;
  border-radius:12px;
}
.blog-card-body { padding:20px; }
.blog-card h3 { font-size:15px; font-weight:500; color:var(--ink); margin-bottom:8px; line-height:1.35; }
.blog-card p { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:14px; }
.blog-card-meta { font-size:12px; color:var(--muted); display:flex; gap:12px; }

/* ═══════════════════════════════════════════
   GEO SECTION
═══════════════════════════════════════════ */
.geo-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
  gap:12px;
}
.geo-card {
  background:white;
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:16px 20px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  gap:10px;
}
.geo-card:hover { border-color:var(--ink-mid); background:var(--pale); transform:translateY(-2px); }
.geo-card-icon { font-size:16px; }
.geo-card-name { font-size:14px; font-weight:500; color:var(--ink); }
.geo-card-count { font-size:11px; color:var(--muted); }

/* ═══════════════════════════════════════════
   ARTICLE PAGE
═══════════════════════════════════════════ */
.article-hero {
  background:var(--ink);
  padding:clamp(3rem,7vw,5rem) clamp(1.5rem,6vw,4rem) clamp(2rem,5vw,4rem);
  color:white;
  position:relative;
  overflow:hidden;
}
.article-hero .court-bg-dark { position:absolute;inset:0; pointer-events:none; }
.article-hero-inner { max-width:760px; margin:0 auto; position:relative; }
.article-eyebrow {
  display:inline-block;
  background:rgba(200,240,60,.15);
  border:1px solid rgba(200,240,60,.3);
  color:var(--acid);
  font-size:11px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:.8px;
  padding:4px 14px;
  border-radius:20px;
  margin-bottom:20px;
}
.article-hero h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem,4vw,3rem);
  font-weight:900;
  line-height:1.15;
  color:white;
  margin-bottom:18px;
}
.article-hero h1 em { color:var(--acid); font-style:normal; }
.article-hero-intro {
  font-size:1.05rem;
  color:rgba(255,255,255,.7);
  line-height:1.7;
  margin-bottom:24px;
}
.article-meta { display:flex; gap:20px; font-size:12px; color:rgba(255,255,255,.45); flex-wrap:wrap; }
.article-meta strong { color:rgba(255,255,255,.7); }

.article-body-wrap {
  max-width:760px;
  margin:0 auto;
  padding:clamp(2rem,5vw,4rem) clamp(1.5rem,5vw,2rem);
}
.toc-box {
  background:var(--pale);
